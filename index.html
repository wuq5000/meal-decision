<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>吃啥</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
:root {
  --pink:#F4A7C3;--pink-d:#D4537E;--pink-l:#FDF0F5;--pink-dk:#72243E;
  --mint:#A8D5BA;--mint-l:#F0FBF6;--mint-dk:#27500A;
  --lav:#C5B4E3;--lav-l:#F3F0FD;--lav-dk:#3C3489;
  --peach:#F7C99A;--peach-l:#FEF6ED;--peach-dk:#633806;
  --sky:#B5C8F0;--sky-l:#EEF3FC;--sky-dk:#0C447C;
  --bg:#FAFAF8;--surf:#FFFFFF;--bdr:rgba(0,0,0,0.08);
  --tx:#1A1A18;--tx2:#666660;--tx3:#AAAAAA;
  --r:14px;--r2:8px;--r3:20px;--nav:60px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC','PingFang SC',sans-serif;background:var(--bg);color:var(--tx)}
.app{width:100%;max-width:430px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;background:var(--surf);position:relative;overflow:hidden}

/* SCREENS */
.scr{position:absolute;inset:0;bottom:var(--nav);overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;-webkit-overflow-scrolling:touch;background:var(--bg)}
.scr.on{display:flex}
.sub{position:absolute;inset:0;bottom:var(--nav);overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column;background:var(--surf);z-index:10;-webkit-overflow-scrolling:touch}
.sub.on{display:flex}

/* NAV */
.nav{height:var(--nav);display:flex;align-items:stretch;border-top:0.5px solid var(--bdr);background:var(--surf);position:absolute;bottom:0;left:0;right:0;z-index:20}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;font-size:10px;color:var(--tx3);font-family:inherit}
.nb.on{color:var(--pink-d)}
.nb svg{width:22px;height:22px}
.ndot{width:4px;height:4px;border-radius:50%;background:var(--pink);opacity:0}
.nb.on .ndot{opacity:1}

/* TOP BAR */
.topbar{padding:14px 20px 0;display:flex;align-items:center;background:var(--surf);flex-shrink:0;gap:8px}
.back{display:flex;align-items:center;gap:4px;border:none;background:none;color:var(--tx2);font-size:14px;cursor:pointer;padding:6px 0;font-family:inherit}
.back svg{width:18px;height:18px}

/* CALENDAR */
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;background:var(--surf)}
.cal-mo{font-size:17px;font-weight:700}
.cal-nav{display:flex;gap:6px}
.cal-nav button{width:32px;height:32px;border-radius:50%;border:0.5px solid var(--bdr);background:var(--bg);cursor:pointer;font-size:16px;color:var(--tx);display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:0 16px 10px;background:var(--surf)}
.cwd{font-size:11px;color:var(--tx3);text-align:center;padding:4px 0 6px}
.cday{display:flex;flex-direction:column;align-items:center;padding:3px 1px;cursor:pointer;border-radius:10px;min-height:44px;transition:background .15s}
.cday:hover{background:var(--pink-l)}
.cday.other .dnum{color:var(--tx3)}
.dnum{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:13px;border-radius:50%}
.cday.today .dnum{background:var(--pink);color:var(--pink-dk);font-weight:700}
.cday.sel:not(.today) .dnum{border:1.5px solid var(--pink-d);color:var(--pink-d);font-weight:500}
.mdots{display:flex;gap:2px;margin-top:2px;height:5px}
.mdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* DAY RECORDS */
.drec{flex:1;padding:0 16px 80px}
.drec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
.drec-title{font-size:14px;font-weight:500;color:var(--tx2)}
.add-btn{font-size:13px;color:var(--pink-d);border:none;background:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:3px}
.mcard{background:var(--surf);border:0.5px solid var(--bdr);border-radius:var(--r);padding:12px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.mcard-bar{width:3px;min-height:44px;border-radius:2px;flex-shrink:0;align-self:stretch}
.mcard-info{flex:1;min-width:0}
.mcard-lbl{font-size:11px;color:var(--tx3);margin-bottom:3px;display:flex;align-items:center;gap:4px}
.mcard-txt{font-size:13px;line-height:1.5;word-break:break-all}
.mcard-acts{display:flex;gap:4px;margin-top:7px}
.mcard-btn{font-size:11px;border:0.5px solid var(--bdr);border-radius:6px;background:none;cursor:pointer;padding:3px 8px;color:var(--tx2);font-family:inherit}
.mcard-btn.del{color:#E24B4A;border-color:#F7C1C1}
.mthumb{width:56px;height:56px;border-radius:10px;object-fit:cover;cursor:pointer;flex-shrink:0;background:var(--bg);border:0.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:22px}
.empty{text-align:center;padding:28px 0;color:var(--tx3);font-size:13px;line-height:2}

/* DECIDE */
.dec-hero{padding:20px 20px 12px;background:var(--surf);flex-shrink:0}
.dec-date{font-size:12px;color:var(--tx3);margin-bottom:3px}
.dec-ttl{font-size:24px;font-weight:700;letter-spacing:-.5px}
.mtabs{display:flex;gap:8px;padding:0 20px 14px;flex-shrink:0}
.mtab{flex:1;padding:10px 6px 8px;border:0.5px solid var(--bdr);border-radius:var(--r);text-align:center;cursor:pointer;font-size:12px;font-family:inherit;color:var(--tx2);background:var(--surf)}
.mtab .em{font-size:20px;display:block;margin-bottom:2px}
.mtab.on{border-color:var(--pink);background:var(--pink-l);color:var(--pink-dk);font-weight:500}
.mcards{padding:0 20px 20px;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.mmode{border:0.5px solid var(--bdr);border-radius:var(--r);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;background:var(--surf);transition:all .2s}
.mmode:active{transform:scale(.98)}
.mic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.mt{font-size:15px;font-weight:500;margin-bottom:1px}
.ms{font-size:12px;color:var(--tx2)}
.marr{margin-left:auto;color:var(--tx3);font-size:18px}

/* SPINNER SCREEN */
.sp-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 20px 20px;gap:8px;min-height:0}

/* SLIDE TABS (swipeable step indicator) */
.slide-tabs{width:100%;display:flex;align-items:center;gap:6px;padding:4px 0 8px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.slide-tabs::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:5px 14px;border-radius:20px;font-size:13px;border:0.5px solid var(--bdr);background:var(--surf);cursor:pointer;color:var(--tx2);font-family:inherit;transition:all .2s}
.stab.on{background:var(--pink-l);border-color:var(--pink);color:var(--pink-dk);font-weight:500}
.stab.done{background:var(--mint-l);border-color:var(--mint);color:var(--mint-dk)}
.stab-add{flex-shrink:0;width:30px;height:30px;border-radius:50%;border:0.5px dashed var(--bdr);background:none;cursor:pointer;color:var(--tx3);font-size:18px;display:flex;align-items:center;justify-content:center;font-family:inherit}
.stab-del{margin-left:3px;font-size:11px;opacity:.7}

/* WHEEL */
.wheel-outer{position:relative;flex-shrink:0}
.wheel-canvas{display:block;border-radius:50%}
.wheel-ptr{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:16px solid var(--pink-d);filter:drop-shadow(0 2px 4px rgba(212,83,126,.3))}
.wheel-hub{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;background:var(--surf);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.spin-result{min-height:40px;text-align:center}
.spin-main{font-size:20px;font-weight:700;color:var(--pink-dk)}
.spin-hint{font-size:11px;color:var(--tx3);margin-top:2px}
.spin-btn{padding:12px 44px;background:var(--pink);color:var(--pink-dk);border:none;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:all .15s;flex-shrink:0}
.spin-btn:active{transform:scale(.96);background:var(--pink-d);color:#fff}

/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:6px;width:100%;min-height:28px}
.tag{padding:4px 10px;background:var(--pink-l);color:var(--pink-dk);border-radius:20px;font-size:12px;display:flex;align-items:center;gap:4px;border:0.5px solid #F4C0D1}
.tag button{background:none;border:none;cursor:pointer;color:var(--pink-dk);font-size:13px;padding:0;line-height:1}

/* OPTS SHEET (bottom drawer) */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none;align-items:flex-end}
.sheet-overlay.on{display:flex}
.sheet{background:var(--surf);border-radius:20px 20px 0 0;width:100%;max-width:430px;margin:0 auto;max-height:80dvh;display:flex;flex-direction:column}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--bdr);margin:10px auto 0}
.sheet-title{padding:12px 20px 10px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between}
.sheet-close{border:none;background:none;cursor:pointer;font-size:22px;color:var(--tx3);line-height:1}
.sheet-body{flex:1;overflow-y:auto;padding:0 20px 8px}
.opt-row{padding:10px 0;font-size:14px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .1s}
.opt-row:last-child{border-bottom:none}
.opt-row.on{color:var(--pink-dk)}
.opt-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.opt-name{flex:1}
.opt-chk{font-size:14px;color:var(--pink-d);min-width:18px;text-align:right}
.opt-del{border:none;background:none;cursor:pointer;color:var(--tx3);font-size:18px;padding:0 2px;line-height:1}
.opt-del:hover{color:#E24B4A}
.add-opt{display:flex;gap:8px;padding:12px 0 4px;border-top:0.5px solid var(--bdr);margin-top:4px}
.add-opt input{flex:1;border:none;background:none;font-size:14px;outline:none;color:var(--tx);font-family:inherit}
.add-opt button{font-size:14px;color:var(--pink-d);border:none;background:none;cursor:pointer;font-weight:500;font-family:inherit}

/* ADD CATEGORY SHEET */
.cat-row{padding:10px 0;font-size:14px;border-bottom:0.5px solid var(--bdr);display:flex;align-items:center;gap:8px}
.cat-row:last-child{border-bottom:none}
.cat-drag{color:var(--tx3);font-size:16px;cursor:grab}
.cat-name{flex:1}
.cat-del{border:none;background:none;cursor:pointer;color:var(--tx3);font-size:18px;line-height:1}
.cat-del:hover{color:#E24B4A}

/* COOK TYPE */
.ctype-cards{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.ctype{border:0.5px solid var(--bdr);border-radius:var(--r3);padding:18px 16px;cursor:pointer;background:var(--surf);display:flex;align-items:center;gap:14px;transition:all .2s}
.ctype:active{transform:scale(.98)}
.ctype-ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ctype-t{font-size:15px;font-weight:700;margin-bottom:3px}
.ctype-s{font-size:12px;color:var(--tx2);line-height:1.5}

/* AI */
.ai-spin{width:36px;height:36px;border:3px solid var(--bdr);border-top-color:var(--pink);border-radius:50%;animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.score-blk{border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:14px}
.score-n{font-size:36px;font-weight:700;line-height:1}
.score-lbl{font-size:11px;margin-top:2px}
.score-rows{flex:1}
.score-row{display:flex;gap:6px;font-size:12px;margin-bottom:4px}
.score-k{color:var(--tx3);min-width:32px}
.score-v{color:var(--tx2)}
.sumbox{background:var(--bg);border-radius:var(--r);padding:14px;font-size:14px;line-height:1.75;color:var(--tx2)}

/* INGREDIENTS */
.ing-dish{margin-bottom:14px}
.ing-name{font-size:14px;font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.ing-name::before{content:'';width:3px;height:14px;background:var(--pink);border-radius:2px;display:block}
.ing-card{border:0.5px solid var(--bdr);border-radius:var(--r2);overflow:hidden}
.ing-row{padding:8px 12px;font-size:13px;border-bottom:0.5px solid var(--bdr);display:flex;justify-content:space-between}
.ing-row:last-child{border-bottom:none}
.ing-amt{color:var(--tx2);font-size:12px}

/* RECORD */
.upload-area{border:1.5px dashed var(--bdr);border-radius:var(--r);padding:24px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:var(--bg)}
.upload-area:hover{border-color:var(--pink);background:var(--pink-l)}
.prev-wrap{position:relative;border-radius:var(--r);overflow:hidden}
.prev-wrap img{width:100%;max-height:200px;object-fit:cover;display:block}
.prev-rm{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.45);color:#fff;border:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
textarea.note{width:100%;padding:12px;border:0.5px solid var(--bdr);border-radius:var(--r);font-size:14px;font-family:inherit;resize:none;outline:none;background:var(--surf);color:var(--tx);min-height:80px;line-height:1.6}
textarea.note:focus{border-color:var(--pink)}

/* BUTTONS */
.btn-p{background:var(--pink);color:var(--pink-dk);border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;padding:13px;font-family:inherit}
.btn-p:active{background:var(--pink-d);color:#fff}
.btn-s{background:none;border:0.5px solid var(--bdr);border-radius:var(--r);font-size:14px;cursor:pointer;padding:13px;color:var(--tx);font-family:inherit}
.btn-s:active{background:var(--bg)}
.row2{display:flex;gap:8px}
.row2 .btn-p,.row2 .btn-s{flex:1}
.section-lbl{font-size:12px;font-weight:500;color:var(--tx2);margin-bottom:6px}

/* LIGHTBOX */
.lbox{position:fixed;inset:0;background:#000;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center}
.lbox.on{display:flex}
.lbox img{width:100vw;height:100dvh;object-fit:contain}
.lbox-close{position:fixed;top:max(env(safe-area-inset-top,0px),14px);right:16px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.18);color:#fff;border:none;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;z-index:10000}
.lbox-hint{position:fixed;bottom:max(env(safe-area-inset-bottom,0px),14px);left:0;right:0;text-align:center;color:rgba(255,255,255,.5);font-size:12px}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:none;align-items:flex-end}
.modal-ov.on{display:flex}
.modal-sheet{background:var(--surf);border-radius:20px 20px 0 0;width:100%;max-width:430px;margin:0 auto;padding:20px 20px 32px}
.modal-t{font-size:15px;font-weight:700;margin-bottom:14px;text-align:center}
.modal-opts{display:flex;flex-direction:column;gap:8px}
.modal-opt{padding:13px 16px;border:0.5px solid var(--bdr);border-radius:var(--r);font-size:14px;cursor:pointer;font-family:inherit;background:var(--surf);color:var(--tx);display:flex;align-items:center;gap:10px}
.modal-opt:active{background:var(--pink-l)}
.modal-cancel{margin-top:8px;padding:13px;border:none;border-radius:var(--r);font-size:14px;cursor:pointer;font-family:inherit;background:var(--bg);color:var(--tx2);width:100%}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav) + 12px);left:50%;transform:translateX(-50%);background:#1A1A18;color:#fff;padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.on{opacity:1}

/* GEAR ICON */
.gear-btn{position:absolute;top:6px;right:6px;width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.85);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--tx2);backdrop-filter:blur(4px)}
.gear-btn svg{width:15px;height:15px}

.gap{height:12px}
.gap-sm{height:8px}
.pad{padding:0 20px}
</style>
</head>
<body>
<div class="app">

  <!-- CALENDAR -->
  <div class="scr on" id="scr-cal">
    <div class="cal-hdr">
      <span class="cal-mo" id="cal-mo"></span>
      <div class="cal-nav">
        <button onclick="chMo(-1)">‹</button>
        <button onclick="chMo(1)">›</button>
      </div>
    </div>
    <div class="cal-grid" id="cal-grid">
      <div class="cwd">日</div><div class="cwd">一</div><div class="cwd">二</div>
      <div class="cwd">三</div><div class="cwd">四</div><div class="cwd">五</div><div class="cwd">六</div>
    </div>
    <div class="drec" id="drec"></div>
  </div>

  <!-- DECIDE -->
  <div class="scr" id="scr-dec">
    <div class="dec-hero">
      <div class="dec-date" id="dec-date"></div>
      <div class="dec-ttl">今天吃什么？</div>
    </div>
    <div class="mtabs">
      <div class="mtab on" onclick="selMeal('breakfast',this)"><span class="em">🌅</span>早餐</div>
      <div class="mtab" onclick="selMeal('lunch',this)"><span class="em">☀️</span>午餐</div>
      <div class="mtab" onclick="selMeal('dinner',this)"><span class="em">🌙</span>晚餐</div>
    </div>
    <div class="mcards" id="mode-cards">
      <div class="mmode" id="mc-bk" onclick="startBk()" style="display:none">
        <div class="mic" style="background:var(--peach-l)">🌸</div>
        <div><div class="mt">早餐转盘</div><div class="ms">依次选主食和饮品等</div></div>
        <span class="marr">›</span>
      </div>
      <div class="mmode" id="mc-del" onclick="startSp('delivery')">
        <div class="mic" style="background:var(--pink-l)">🛵</div>
        <div><div class="mt">叫外卖</div><div class="ms">转盘决定，支持手动选</div></div>
        <span class="marr">›</span>
      </div>
      <div class="mmode" id="mc-dine" onclick="startSp('dine')">
        <div class="mic" style="background:var(--mint-l)">🍽️</div>
        <div><div class="mt">出去吃</div><div class="ms">转盘决定，支持手动选</div></div>
        <span class="marr">›</span>
      </div>
      <div class="mmode" id="mc-cook" onclick="startCkType()">
        <div class="mic" style="background:var(--lav-l)">👨‍🍳</div>
        <div><div class="mt">自己做饭</div><div class="ms">AI 营养评估 + 食材清单</div></div>
        <span class="marr">›</span>
      </div>
    </div>
  </div>

  <!-- SUB: SINGLE SPINNER (外卖/出去吃) -->
  <div class="sub" id="sub-sp">
    <div class="topbar">
      <button class="back" onclick="goBack('sp')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>返回
      </button>
      <span style="font-size:16px;font-weight:700;flex:1" id="sp-title"></span>
    </div>
    <div class="sp-wrap" style="padding-top:12px">
      <div class="spin-result" id="sp-result-box">
        <div class="spin-main" id="sp-main"></div>
        <div class="spin-hint" id="sp-hint">转动转盘，或在下方手动选</div>
      </div>
      <div class="wheel-outer" id="sp-wheel-outer">
        <canvas id="sp-canvas"></canvas>
        <div class="wheel-ptr"></div>
        <div class="wheel-hub" id="sp-hub"></div>
        <button class="gear-btn" onclick="openSheet('sp')" title="管理选项">

const DSKEY='sk-3745741b78424612b2d7c525209331d3';
const MC=['#F4A7C3','#A8D5BA','#B5C8F0','#F7C99A','#C5B4E3','#F0D5A0','#AADDE8','#F4B8B8','#B8E0C5','#D4B8E0'];

// ─── DEFAULT DATA ───────────────────────────────────────────────────────────
const DEF={
  spOpts:{
    delivery:['沙县小吃','黄焖鸡米饭','兰州拉面','螺蛳粉','麻辣烫','日式拉面','盖浇饭','麦当劳','肯德基'],

  multiOpts:{
    breakfast:{'主食':['粥','馒头','全麦面包','包子','油条','三明治','吐司'],'饮品':['牛奶','豆浆','果汁','咖啡','无糖绿茶','豆腐脑']},
    cook:{'荤菜':['红烧肉','宫保鸡丁','糖醋排骨','清蒸鱼','回锅肉','牛肉炒西兰花'],'素菜':['炒时蔬','蒜蓉菠菜','番茄炒蛋','麻婆豆腐','炒蘑菇','凉拌黄瓜'],'汤':['西红柿蛋花汤','排骨汤','紫菜蛋花汤','冬瓜汤','莲藕猪骨汤'],'主食':['白米饭','炒饭','面条','馒头','饺子']},
    light:{'蛋白质':['鸡胸肉','水煮蛋','三文鱼','豆腐','希腊酸奶','虾仁'],'碳水':['糙米饭','红薯','燕麦','全麦面包','藜麦','玉米'],'健康脂肪':['牛油果','坚果','橄榄油','奇亚籽'],'膳食纤维':['西兰花','生菜','黄瓜','番茄','菠菜','芹菜','彩椒']}
  }
};

// ─── STATE ──────────────────────────────────────────────────────────────────
function loadS(){
  try{
    const raw=localStorage.getItem('mealapp_v4');
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null}
}
function saveS(){
  try{
    // Strip photos from records before saving (photos stored separately)
    const recordsNoPhoto={};
    for(const day in S.records){
      recordsNoPhoto[day]={};
      for(const meal in S.records[day]){
        const r=S.records[day][meal];
        recordsNoPhoto[day][meal]={mode:r.mode,note:r.note,time:r.time,hasPhoto:!!r.photo};
      }
    }
    const data={records:recordsNoPhoto,spOpts:S.spOpts,multiCats:S.multiCats,multiOpts:S.multiOpts};
    localStorage.setItem('mealapp_v4',JSON.stringify(data));
    // Save photos separately per record key
    for(const day in S.records){
      for(const meal in S.records[day]){
        const r=S.records[day][meal];
        const pkey='mealphoto_'+day+'_'+meal;
        if(r.photo){
          try{localStorage.setItem(pkey,r.photo);}catch(e){console.warn('Photo too large to save:',pkey);}
        } else {
          localStorage.removeItem(pkey);
        }
      }
    }
    return true;
  }catch(e){
    console.error('saveS failed:',e);
    return false;
  }
}

function loadPhotos(){
  // Restore photos into S.records from separate localStorage keys
  for(const day in S.records){
    for(const meal in S.records[day]){
      if(S.records[day][meal].hasPhoto){
        const pkey='mealphoto_'+day+'_'+meal;
        const photo=localStorage.getItem(pkey);
        if(photo)S.records[day][meal].photo=photo;
      }
    }
  }
}

const saved=loadS();
const S={
  calY:new Date().getFullYear(),calM:new Date().getMonth(),
  selDate:null,
  mealTime:'breakfast',
  mode:null,         // 'delivery'|'dine'|'breakfast'|'cook'|'light'|'direct'
  spMode:null,       // key for single spinner
  multiMode:null,    // 'breakfast'|'cook'|'light'
  multiStep:0,
  multiSel:{},       // {cat:[...items]}
  spResult:null,
  photoData:null,
  editKey:null,
  aiResult:null,
  // Persisted — saved wins completely, DEF only as fallback when key missing
  records: (saved&&saved.records)?saved.records:{},
  spOpts: (saved&&saved.spOpts)?saved.spOpts:JSON.parse(JSON.stringify(DEF.spOpts)),
  multiCats: (saved&&saved.multiCats)?saved.multiCats:JSON.parse(JSON.stringify(DEF.multiCats)),
  multiOpts: (saved&&saved.multiOpts)?saved.multiOpts:JSON.parse(JSON.stringify(DEF.multiOpts)),
};

function deepMerge(def,sv){
  if(Array.isArray(sv))return JSON.parse(JSON.stringify(sv));
  if(typeof sv!=='object'||sv===null)return sv;
  const out=JSON.parse(JSON.stringify(def||{}));
  for(const k in sv){
    if(sv[k]!==null&&typeof sv[k]==='object'&&!Array.isArray(sv[k])){
      out[k]=deepMerge(out[k]||{},sv[k]);
    }else{
      out[k]=JSON.parse(JSON.stringify(sv[k]));
    }
  }
  return out;
}

// ─── SCREEN / SUB MANAGEMENT ────────────────────────────────────────────────
function showScr(name){

// ─── CALENDAR ───────────────────────────────────────────────────────────────
let calY=new Date().getFullYear(),calM=new Date().getMonth();
function chMo(d){calM+=d;if(calM>11){calM=0;calY++;}else if(calM<0){calM=11;calY--;}renderCal();}

function renderCal(){
  const mos=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('cal-mo').textContent=calY+'年 '+mos[calM];
  const grid=document.getElementById('cal-grid');
  const wds=['日','一','二','三','四','五','六'];
  let html=wds.map(w=>`<div class="cwd">${w}</div>`).join('');
  const first=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const prev=new Date(calY,calM,0).getDate();
  const now=new Date();
  const dc={breakfast:'#F4A7C3',lunch:'#A8D5BA',dinner:'#B5C8F0'};
  for(let i=0;i<first;i++)html+=`<div class="cday other"><span class="dnum">${prev-first+i+1}</span></div>`;
  for(let d=1;d<=days;d++){
    const isT=d===now.getDate()&&calM===now.getMonth()&&calY===now.getFullYear();
    const isSel=S.selDate&&S.selDate.y===calY&&S.selDate.m===(calM+1)&&S.selDate.d===d;
    const key=`${calY}-${calM+1}-${d}`;
    const rec=S.records[key]||{};
    let dots='';
    if(rec.breakfast)dots+=`<div class="mdot" style="background:${dc.breakfast}"></div>`;
    if(rec.lunch)dots+=`<div class="mdot" style="background:${dc.lunch}"></div>`;
    if(rec.dinner)dots+=`<div class="mdot" style="background:${dc.dinner}"></div>`;
    html+=`<div class="cday${isT?' today':''}${isSel&&!isT?' sel':''}" onclick="selDay(${calY},${calM+1},${d})"><span class="dnum">${d}</span><div class="mdots">${dots}</div></div>`;
  }
  grid.innerHTML=html;
  const sd=S.selDate;
  if(sd)renderDrec(sd.y,sd.m,sd.d);
  else renderDrec(now.getFullYear(),now.getMonth()+1,now.getDate());
}

function selDay(y,m,d){S.selDate={y,m,d};renderCal();}

function renderDrec(y,m,d){
  const key=`${y}-${m}-${d}`;
  const rec=S.records[key]||{};
  const now=new Date();
  const isT=d===now.getDate()&&m===(now.getMonth()+1)&&y===now.getFullYear();
  const mms=[{k:'breakfast',lbl:'早餐',em:'🌅',c:'#F4A7C3'},{k:'lunch',lbl:'午餐',em:'☀️',c:'#A8D5BA'},{k:'dinner',lbl:'晚餐',em:'🌙',c:'#B5C8F0'}];
  const modeMap={delivery:'外卖',dine:'出去吃',cook:'自己做',breakfast:'早餐',light:'轻食',direct:''};
  const el=document.getElementById('drec');
  let html=`<div class="drec-hdr"><span class="drec-title">${y}年${m}月${d}日${isT?' · 今天':''}</span><button class="add-btn" onclick="openMealMo(${y},${m},${d})">＋ 添加</button></div>`;
  let any=false;
  mms.forEach(({k,lbl,em,c})=>{
    if(rec[k]){
      any=true;const r=rec[k];
      const mLbl=r.mode&&modeMap[r.mode]?` · ${modeMap[r.mode]}`:'';
      const thumb=r.photo
        ?`<img class="mthumb" src="${r.photo}" onclick="openLbox('${r.photo.replace(/'/g,"\\'")}')" alt="">`
        :`<div class="mthumb">${em}</div>`;
      html+=`<div class="mcard">
        <div class="mcard-bar" style="background:${c}"></div>
        <div class="mcard-info">

let _swipeX=null;
function setupSwipe(){
  const el=document.getElementById('sub-multi');
  el.ontouchstart=e=>{_swipeX=e.touches[0].clientX;};
  el.ontouchend=e=>{
    if(_swipeX===null)return;
    const dx=e.changedTouches[0].clientX-_swipeX;
    _swipeX=null;
    if(Math.abs(dx)<40)return; // ignore small moves
    const cats=S.multiCats[S.multiMode]||[];
    if(dx<0&&S.multiStep<cats.length-1){S.multiStep++;renderMultiStep();}
    else if(dx>0&&S.multiStep>0){S.multiStep--;renderMultiStep();}
  };
}

// ─── WHEEL ENGINE ────────────────────────────────────────────────────────────
function sizeWheel(outerID,canvasID,hubID){
  const vw=Math.min(window.innerWidth,430);
  const sz=Math.min(Math.floor(vw*0.72),280);
  const outer=document.getElementById(outerID);
  const canvas=document.getElementById(canvasID);
  const hub=document.getElementById(hubID);
  outer.style.width=sz+'px';outer.style.height=sz+'px';
  canvas.width=sz*2;canvas.height=sz*2; // retina
  canvas.style.width=sz+'px';canvas.style.height=sz+'px';
  const hubSz=Math.round(sz*0.13);
  hub.style.width=hubSz+'px';hub.style.height=hubSz+'px';
}

function drawWheel(canvasID,opts,angle){
  const canvas=document.getElementById(canvasID);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,cx=W/2,cy=W/2,r=cx-4;
  ctx.clearRect(0,0,W,W);
  if(!opts||!opts.length){
    ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#aaa';ctx.font=`${W*0.055}px sans-serif`;ctx.textAlign='center';ctx.fillText('请添加选项',cx,cy+6);return;
  }
  const n=opts.length;
  const slice=(Math.PI*2)/n;
  // shadow ring
  ctx.save();ctx.beginPath();ctx.arc(cx,cy,r+3,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();ctx.restore();

  opts.forEach((opt,i)=>{
    const a=i*slice-Math.PI/2+angle;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,a,a+slice);ctx.closePath();
    ctx.fillStyle=MC[i%MC.length];ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=W*0.008;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(a+slice/2);
    const fs=Math.max(W*0.04,Math.min(W*0.055,W*0.8/n));
    ctx.font=`600 ${fs}px 'Noto Sans SC',sans-serif`;
    ctx.textAlign='right';ctx.fillStyle=MCD[i%MCD.length];
    const label=opt.length>5?opt.slice(0,4)+'…':opt;
    ctx.fillText(label,r-W*0.04,fs*0.35);
    ctx.restore();
  });
  // outer ring
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=W*0.012;ctx.stroke();
}

function anim(opts,canvasID,startAngle,onDone){
  const total=(5+Math.random()*5)*Math.PI*2;
  const dur=2600+Math.random()*1000;
  const t0=performance.now();
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    const e=1-Math.pow(1-t,3);
    const a=startAngle+total*e;
    drawWheel(canvasID,opts,a);
    if(t<1){requestAnimationFrame(frame);return;}
    // Slice i is drawn starting at: i*slice - PI/2 + angle
    // Pointer is at top = angle 0 in canvas coords = -PI/2 in unit circle
    // We need which slice covers canvas angle -PI/2 (top)
    // Slice i covers: [i*slice - PI/2 + a, (i+1)*slice - PI/2 + a]
    // Solve: i*slice - PI/2 + a <= -PI/2 < (i+1)*slice - PI/2 + a
    //   => i*slice <= -a < (i+1)*slice  (mod 2PI)
    //   => index = floor((-a mod 2PI) / slice)
    const n=opts.length;
    const slice=(Math.PI*2)/n;
    const norm=((-a)%(Math.PI*2)+(Math.PI*2))%(Math.PI*2);
    const idx=Math.floor(norm/slice)%n;
    onDone(opts[idx],a);
  }
  requestAnimationFrame(frame);
}

const ML={breakfast:'早餐',lunch:'午餐',dinner:'晚餐'};
const MD={delivery:'外卖',dine:'出去吃',cook:'自己做',breakfast:'早餐',light:'轻食',direct:''};

function goRec(){
  S.editKey=null;
  let note='';
  if(S.mode==='delivery'||S.mode==='dine')note=S.spResult||'';
  else if(S.mode==='breakfast')note=Object.entries(S.multiSel).filter(([k,v])=>v.length>0).map(([k,v])=>`${k}：${v.join('、')}`).join(' / ');
  else if(S.mode==='cook'||S.mode==='light')note=Object.entries(S.multiSel).filter(([k,v])=>v.length>0).map(([k,v])=>`${k}：${v.join('、')}`).join(' / ');

  openRec(note);
}
function openRec(note=''){
  const modeStr=MD[S.mode]?`${ML[S.mealTime]} · ${MD[S.mode]}`:ML[S.mealTime];
  document.getElementById('rec-ttl').textContent=S.editKey&&S.mode!=='direct'?'编辑记录':'记录这餐';
  document.getElementById('rec-sub').textContent=modeStr;
  document.getElementById('rec-note').value=note;
  if(S.photoData){
    document.getElementById('rec-upload').style.display='none';
    document.getElementById('rec-prev').style.display='block';
    document.getElementById('prev-img').src=S.photoData;
  }else{
    document.getElementById('rec-upload').style.display='block';
    document.getElementById('rec-prev').style.display='none';
  }
  document.getElementById('photo-inp').value='';
  showSub('rec');
}
function openRecEdit(note,isEdit){
  openRec(note);
  if(isEdit)document.getElementById('rec-ttl').textContent='编辑记录';
}
function handlePhoto(e){
  const f=e.target.files[0];if(!f)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    S.photoData=ev.target.result;
    document.getElementById('prev-img').src=ev.target.result;
    document.getElementById('rec-upload').style.display='none';
    document.getElementById('rec-prev').style.display='block';
  };reader.readAsDataURL(f);
}
function rmPhoto(){
  S.photoData=null;
  document.getElementById('rec-upload').style.display='block';
  document.getElementById('rec-prev').style.display='none';
  document.getElementById('photo-inp').value='';
}
function saveRec(){
  const note=document.getElementById('rec-note').value.trim();
  const key=S.editKey||(()=>{const t=new Date();return`${t.getFullYear()}-${t.getMonth()+1}-${t.getDate()}`})();
  if(!S.records[key])S.records[key]={};
  S.records[key][S.mealTime]={mode:S.mode,note,photo:S.photoData,time:new Date().toISOString()};
  saveS();
  S.editKey=null;
  toast('记录已保存 ✓');
  const parts=key.split('-');
  S.selDate={y:+parts[0],m:+parts[1],d:+parts[2]};
  setTimeout(()=>showScr('cal'),600);
}

// ─── LIGHTBOX ────────────────────────────────────────────────────────────────
function openLbox(src){document.getElementById('lbox-img').src=src;document.getElementById('lbox').classList.add('on');}
function closeLbox(){document.getElementById('lbox').classList.remove('on');}

// ─── UTILS ──────────────────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('on');
  setTimeout(()=>t.classList.remove('on'),2000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadPhotos();
renderCal();
showScr('cal');
const now=new Date();
S.selDate={y:now.getFullYear(),m:now.getMonth()+1,d:now.getDate()};
renderDrec(now.getFullYear(),now.getMonth()+1,now.getDate());
</script>
